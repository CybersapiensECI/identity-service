name: CD – Deploy to QA

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: alphaeci/identity-service
  RESOURCE_GROUP: alphaECI-prod

jobs:

  build-and-push:
    name: "Build & Push Docker Image"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${{ github.sha }}

  deploy-qa:
    name: "Deploy to QA"
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to QA Container App
        run: |
          az containerapp update \
            --name alphaeci-identity-service-qa \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:qa-${{ github.sha }}

      - name: Health check QA
        run: |
          sleep 30
          QA_URL=$(az containerapp show \
            --name alphaeci-identity-service-qa \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "QA URL: https://$QA_URL"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://$QA_URL/actuator/health)
            echo "Attempt $i — HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then exit 0; fi
            sleep 15
          done
          echo "Health check failed" && exit 1
