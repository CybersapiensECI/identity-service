spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    ssl:
      enabled: ${RABBITMQ_SSL_ENABLED:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      ssl:
        enabled: ${SPRING_DATA_REDIS_SSL_ENABLED:false}
      # Sin esto, Lettuce usa sus defaults (~60s de command timeout): si
      # Redis está mal configurado o inalcanzable, initVerification/login
      # se cuelgan ~30-60s y devuelven 500 recién entonces — indistinguible
      # para el cliente de "sin conexión" (verificado: 30.4s -> 500 en
      # producción). Con esto falla en segundos y el error real queda en
      # los logs del servicio en vez de parecer una caída total de red.
      connect-timeout: 3s
      timeout: 3s
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${APP_JWT_SECRET}

management:
  health:
    rabbit:
      enabled: false

rabbitmq:
  exchange:
    identity: ${RABBITMQ_EXCHANGE:identity.exchange}
    # Owned by the notification-service; OTP and password-reset events go here.
    notification: ${RABBITMQ_EXCHANGE_NOTIFICATION:notification.exchange}
  routing-key:
    # Must match the auth.# binding of notification.auth.queue.
    otp: ${RABBITMQ_KEY_OTP:auth.otp}
    password-reset: ${RABBITMQ_KEY_PASSWORD_RESET:auth.password-reset}
    user-verified: ${RABBITMQ_KEY_USER_VERIFIED:identity.event.user-verified}

logging:
  level:
    co.edu.escuelaing: INFO
    org.springframework.security: WARN
