spring:
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/identity_db}"
    username: "${SPRING_DATASOURCE_USERNAME:postgres}"
    password: "${SPRING_DATASOURCE_PASSWORD:postgres}"
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: "${SPRING_REDIS_HOST:localhost}"
      port: "${SPRING_REDIS_PORT:6379}"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: "${APP_JWT_SECRET:8ZXzTzsB5yWexiCkv/EHBVYvJbr1qHOwJv44xm/mDFo=}"
    expiration: "${APP_JWT_EXPIRATION:900000}"
    refresh-expiration: "${APP_JWT_REFRESH_EXPIRATION:604800000}"
  otp:
    expiration-minutes: 10
    max-attempts: 5

logging:
  level:
    co.edu.escuelaing: DEBUG
    org.springframework.security: DEBUG
